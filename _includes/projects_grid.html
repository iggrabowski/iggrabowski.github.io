<!-- Portfolio Grid Section -->
<section id="projects">
  <div class="container portfolio-flex-grid">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2>Artwork</h2>
        <!--
        <hr class="star-primary">
        -->
      </div>
    </div>
    <div class="portfolio-flex-row">
      {% for project in site.projects %}
      <div class="portfolio-flex-item portfolio-item">
        <a href="#portfolioModal-{{ project.modal-id }}" class="portfolio-link" data-toggle="modal">
          <div class="caption">
            <div class="caption-content">
              {{ project.title }}
            </div>
          </div>
          <img src="img/portfolio/{{ project.img-thumbnail }}" class="img-responsive" alt="{{ project.alt }}">
        </a>
      </div>
      {% endfor %}
    </div>
  </div>
</section>D.png
